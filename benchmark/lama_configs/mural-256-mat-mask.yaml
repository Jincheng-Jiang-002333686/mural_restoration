# @package _group_
# Mural dataset, 256x256, online training masks from MAT's generator
# (mask_type=mixed, hole_range=[0.2, 0.3]) to match the MAT experiment.
# no_augs matches MAT's --aug=noaug setting (images are pre-resized to 256).

batch_size: 10
val_batch_size: 6
num_workers: 6

train:
  indir: ${location.data_root_dir}/train
  out_size: 256
  img_suffix: .png
  mask_generator_kind: mat_mural
  mask_gen_kwargs:
    hole_range: [0.2, 0.3]
    mask_type: mixed
  transform_variant: no_augs
  dataloader_kwargs:
    batch_size: ${data.batch_size}
    shuffle: True
    num_workers: ${data.num_workers}

val:
  indir: ${location.data_root_dir}/val
  img_suffix: .png
  dataloader_kwargs:
    batch_size: ${data.val_batch_size}
    shuffle: False
    num_workers: ${data.num_workers}

visual_test:
  indir: ${location.data_root_dir}/visual_test
  img_suffix: .png
  pad_out_to_modulo: 32
  dataloader_kwargs:
    batch_size: 1
    shuffle: False
    num_workers: ${data.num_workers}
