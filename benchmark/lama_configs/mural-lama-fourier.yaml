run_title: 'mural-mixed02-03'

training_model:
  kind: default
  visualize_each_iters: 1000
  concat_mask: true
  store_discr_outputs_for_vis: true
losses:
  l1:
    weight_missing: 0
    weight_known: 10
  perceptual:
    weight: 0
  adversarial:
    kind: r1
    weight: 10
    gp_coef: 0.001
    mask_as_fake_target: true
    allow_scale_mask: true
  feature_matching:
    weight: 100
  resnet_pl:
    weight: 30
    weights_path: ${env:TORCH_HOME}

wandb:
  enable: true
  project: mural_inpainting
  entity: null
  name: lama-fourier-mural-mixed02-03

defaults:
  - location: mural
  - data: mural-256-mat-mask
  - generator: ffc_resnet_075
  - discriminator: pix2pixhd_nlayer
  - optimizers: default_optimizers
  - visualizer: directory
  - evaluator: mural_inpainted
  - trainer: mural_1gpu
  - hydra: overrides
