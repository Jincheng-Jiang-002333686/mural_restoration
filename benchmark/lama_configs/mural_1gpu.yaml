# @package _group_
# Single-GPU (RTX 3090) trainer. 55 epochs x 10584 images ~ 582 kimg,
# matching the MAT run's ~572 kimg budget.
kwargs:
  gpus: 1
  max_epochs: 55
  gradient_clip_val: 1
  log_every_n_steps: 250
  precision: 32
  terminate_on_nan: False
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2

# Monitor FID directly: the ssim_fid100_f1 integral clamps to 0 when FID > 100,
# which makes it useless for checkpoint selection on this dataset (MAT's FID ~140).
checkpoint_kwargs:
  verbose: True
  save_top_k: 5
  save_last: True
  period: 1
  monitor: val_fid_total_mean
  mode: min
